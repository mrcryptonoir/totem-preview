name: Sync fork with upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fast-forward main from fred-terzi/totem-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync mrcryptonoir/totem-preview \
            --source fred-terzi/totem-preview \
            --branch main
